name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read package metadata
        id: package
        run: |
          name=$(bun -e 'const pkg = JSON.parse(await Bun.file("package.json").text()); console.log(pkg.name)')
          version=$(bun -e 'const pkg = JSON.parse(await Bun.file("package.json").text()); console.log(pkg.version)')
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check pending changesets
        id: changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "count=$count" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm publish state
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub release state
        id: gh_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan release actions
        id: plan
        run: |
          pending="${{ steps.changesets.outputs.pending }}"
          published="${{ steps.npm.outputs.published }}"
          release_exists="${{ steps.gh_release.outputs.exists }}"

          if [ "$pending" = "true" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$published" = "false" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$release_exists" = "false" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize release plan
        run: |
          {
            echo "Release plan for \`${{ steps.package.outputs.name }}\`"
            echo
            echo "- Version: \`${{ steps.package.outputs.version }}\`"
            echo "- Tag: \`${{ steps.package.outputs.tag }}\`"
            echo "- Pending changesets: \`${{ steps.changesets.outputs.pending }}\`"
            echo "- Pending changeset count: \`${{ steps.changesets.outputs.count }}\`"
            echo "- Already on npm: \`${{ steps.npm.outputs.published }}\`"
            echo "- GitHub release exists: \`${{ steps.gh_release.outputs.exists }}\`"
            echo "- Will publish to npm: \`${{ steps.plan.outputs.should_publish }}\`"
            echo "- Will create GitHub release: \`${{ steps.plan.outputs.should_release }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note pending changesets
        if: steps.changesets.outputs.pending == 'true'
        run: |
          {
            echo "Pending changesets were found."
            echo
            echo "- Publish was skipped"
            echo "- Run \`bun run version-packages\` and commit the versioned files before publishing"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note trusted publisher requirement
        if: steps.changesets.outputs.pending != 'true' && steps.plan.outputs.should_publish == 'true'
        run: |
          {
            echo "Trusted publishing is required for npm publish."
            echo
            echo "- Configure npm trusted publishing for the  \`KitsuneKode/loom-cli\ `"
            echo "- Workflow filename must be \`release.yml\`"
            echo "- GitHub-hosted runners are required"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify release build
        if: steps.plan.outputs.should_publish == 'true'
        run: |
          bun run changeset:status
          bun run check
          bun run pkg:check

      - name: Set up Node
        if: steps.plan.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.plan.outputs.should_publish == 'true'
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.package.outputs.tag }}" --generate-notes --title "${{ steps.package.outputs.tag }}"
